<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none" role="img" aria-label="status success check icon">
<title>status success check icon</title>
<defs>
  <linearGradient id="success_bg" x1="42" y1="30" x2="216" y2="236" gradientUnits="userSpaceOnUse">
    <stop stop-color="#FFFFFF" stop-opacity=".95"/>
    <stop offset="1" stop-color="#16B85E" stop-opacity=".16"/>
  </linearGradient>
  <radialGradient id="success_halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(128 130) rotate(90) scale(84)">
    <stop stop-color="#16B85E" stop-opacity=".23"/>
    <stop offset=".55" stop-color="#16B85E" stop-opacity=".10"/>
    <stop offset="1" stop-color="#16B85E" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="success_circle" x1="86" y1="78" x2="170" y2="178" gradientUnits="userSpaceOnUse">
    <stop stop-color="#16B85E"/>
    <stop offset="1" stop-color="#0EA64B"/>
  </linearGradient>
  <filter id="success_shadow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
    <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#16B85E" flood-opacity=".20"/>
    <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0F172A" flood-opacity=".10"/>
  </filter>
  <filter id="success_soft" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
    <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0B3A91" flood-opacity=".14"/>
  </filter>
</defs>

<rect x="36" y="36" width="184" height="184" rx="52" fill="url(#success_bg)" opacity=".88" filter="url(#success_soft)"/>
<circle cx="128" cy="128" r="88" fill="url(#success_halo)"/>
<circle cx="128" cy="128" r="55" fill="url(#success_circle)" filter="url(#success_shadow)"/>
<circle cx="110" cy="94" r="7" fill="#FFFFFF" opacity=".36"/>
<path d="M76 88C90 64 113 53 139 56" stroke="#fff" stroke-opacity=".32" stroke-width="5" stroke-linecap="round"/>

<path d="M99 128.5l20.5 20.5L161 105" stroke="#fff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

</svg>