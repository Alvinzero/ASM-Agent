<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none" role="img" aria-label="home navigation icon">
<title>home navigation icon</title>
<defs>
  <linearGradient id="home_bg" x1="42" y1="30" x2="216" y2="236" gradientUnits="userSpaceOnUse">
    <stop stop-color="#FFFFFF" stop-opacity=".95"/>
