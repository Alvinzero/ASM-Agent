    <stop offset=".55" stop-color="#64748B" stop-opacity=".10"/>
    <stop offset="1" stop-color="#64748B" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="demo_circle" x1="86" y1="78" x2="170" y2="178" gradientUnits="userSpaceOnUse">
