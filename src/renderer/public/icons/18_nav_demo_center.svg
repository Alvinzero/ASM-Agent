<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none" role="img" aria-label="demo center navigation icon">
<title>demo center navigation icon</title>
<defs>
  <linearGradient id="demo_bg" x1="42" y1="30" x2="216" y2="236" gradientUnits="userSpaceOnUse">
    <stop stop-color="#FFFFFF" stop-opacity=".95"/>
    <stop offset="1" stop-color="#64748B" stop-opacity=".16"/>
  </linearGradient>
  <radialGradient id="demo_halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(128 130) rotate(90) scale(84)">
