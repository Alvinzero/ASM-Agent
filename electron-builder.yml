appId: com.company.asmagent
productName: ASM Agent
directories:
  output: release
files:
  - dist-main/**
  - dist-renderer/**
  - package.json
asar: true
win:
  artifactName: ASM-Agent-Setup-${version}.${ext}
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ASM Agent
publish:
  provider: github
  owner: ${env.GH_RELEASE_OWNER}
  repo: ${env.GH_RELEASE_REPO}
