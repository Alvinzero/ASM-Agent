appId: com.company.asmagent
productName: ASM Agent
directories:
  output: release
files:
  - dist-main/**
  - dist-renderer/**
  - package.json
asar: true
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ASM Agent
