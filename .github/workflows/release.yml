name: Release Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_RELEASE_OWNER: ${{ github.repository_owner }}
      GH_RELEASE_REPO: ${{ github.event.repository.name }}
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run release:win

      - name: Ensure published release exists
        shell: pwsh
        run: |
          $existing = gh release view "$env:RELEASE_TAG" --json isDraft,tagName --repo "$env:GH_RELEASE_OWNER/$env:GH_RELEASE_REPO" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:RELEASE_TAG" `
              --title "$env:RELEASE_TAG" `
              --notes "自动构建发布 $env:RELEASE_TAG" `
              --repo "$env:GH_RELEASE_OWNER/$env:GH_RELEASE_REPO"
            exit $LASTEXITCODE
          }

          Write-Host "Release already exists for $env:RELEASE_TAG"
          Write-Host $existing
          $release = $existing | ConvertFrom-Json
          if ($release.isDraft) {
            gh release edit "$env:RELEASE_TAG" --draft=false --repo "$env:GH_RELEASE_OWNER/$env:GH_RELEASE_REPO"
          }

      - name: Upload Windows release assets
        shell: pwsh
        run: |
          Get-ChildItem release

          $installer = Get-ChildItem release -Filter *.exe | Where-Object { $_.Name -notlike '*.blockmap' } | Select-Object -First 1
          $blockmap = Get-ChildItem release -Filter *.exe.blockmap | Select-Object -First 1
          $latest = Get-Item release/latest.yml -ErrorAction SilentlyContinue

          $artifacts = @($installer, $blockmap, $latest) | Where-Object { $null -ne $_ }

          if ($artifacts.Count -ne 3) {
            Write-Error "Missing release artifacts. Expected installer exe, blockmap, and latest.yml."
            exit 1
          }

          foreach ($artifact in $artifacts) {
            Write-Host "Uploading $($artifact.FullName)"
            gh release upload "$env:RELEASE_TAG" "$($artifact.FullName)" --clobber --repo "$env:GH_RELEASE_OWNER/$env:GH_RELEASE_REPO"
          }
